  {id:9,nom:"Crème fraîche",unite:"L",allergenes:["lactose"],prix:{10:[{v:3.20,d:"2025-02-01"}],11:[{v:3.10,d:"2025-03-01"}],12:[{v:3.40,d:"2025-02-15"}]}},
  {id:10,nom:"Chocolat noir 64%",unite:"kg",allergenes:["gluten","lactose"],prix:{10:[{v:12.50,d:"2025-02-01"}],11:[{v:11.80,d:"2025-03-01"}],12:[{v:13.00,d:"2025-02-15"}]}}

const DEMO_RECS=[
  {id:101,nom:"Pain de Campagne",cat:"pains",freq:12,notes:"Cuisson 250°C 35min. Scarifier avant enfournement.",photo:null,poids:"400",modeCalc:"poids",pieces:1,lignes:[{id:1,q:1000},{id:4,q:650},{id:2,q:20},{id:3,q:5}]},
  {id:102,nom:"Croissant Beurre",cat:"viennoiseries",freq:8,notes:"Tourage 3 fois. Repos 1h au frigo entre chaque tour.",photo:null,poids:"85",modeCalc:"poids",pieces:1,lignes:[{id:1,q:500},{id:5,q:250},{id:8,q:150},{id:6,q:60},{id:2,q:10},{id:3,q:15},{id:7,q:2}]},
  {id:103,nom:"Tarte Citron",cat:"patisseries",freq:5,notes:"Meringue italienne à 118°C.",photo:null,poids:"120",modeCalc:"pieces",pieces:8,lignes:[{id:1,q:250},{id:5,q:125},{id:6,q:100},{id:7,q:3}]},
  {id:104,nom:"Fondant Chocolat",cat:"patisseries",freq:3,notes:"Cœur coulant 10min à 200°C.",photo:null,poids:"90",modeCalc:"pieces",pieces:6,lignes:[{id:10,q:200},{id:5,q:150},{id:6,q:120},{id:7,q:4},{id:1,q:50}]},
  {id:105,nom:"Baguette Tradition",cat:"pains",freq:20,notes:"Fermentation 18h à 4°C. Cuisson 240°C avec buée.",photo:null,poids:"250",modeCalc:"poids",pieces:1,lignes:[{id:1,q:1000},{id:4,q:680},{id:2,q:18},{id:3,q:3}]}
];

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
const fe=(n,d=2)=>Number(n).toFixed(d)+' €';
const f3=n=>Number(n).toFixed(3);
const today=()=>new Date().toISOString().split('T')[0];
const daysSince=d=>Math.floor((Date.now()-new Date(d).getTime())/86400000);
function dprix(ing,fid){const h=ing.prix?.[fid];return h&&h.length?h[h.length-1]:null;}
function bestPrice(ing,fid=null){
  if(!ing.prix||!Object.keys(ing.prix).length)return 0;
  if(fid!=null){const dp=dprix(ing,fid);return dp?dp.v:0;}
  const vals=Object.values(ing.prix).map(h=>h&&h.length?h[h.length-1].v:0).filter(v=>v>0);
  return vals.length?Math.min(...vals):0;
}
function cheapestFid(ing){
  if(!ing.prix)return null;
  let min=Infinity,fid=null;
  Object.entries(ing.prix).forEach(([k,h])=>{if(!h||!h.length)return;const v=h[h.length-1].v;if(v>0&&v<min){min=v;fid=parseInt(k);}});
  return fid;
}
function coutRec(rec,ings,fm={}){
  return rec.lignes.reduce((s,l)=>{
    const ing=ings.find(i=>i.id===l.id);if(!ing)return s;
    const p=bestPrice(ing,fm[l.id]??null);
    return s+(l.q/(ing.unite==='piece'?1:1000))*p;
  },0);
}
function cppRec(rec,ings,fm={}){
  const ct=coutRec(rec,ings,fm);
  const pp=parseFloat(rec.poids)||0;
  const ptp=rec.lignes.reduce((s,l)=>s+(parseFloat(l.q)||0),0);
  if(rec.modeCalc==='poids'&&pp>0&&ptp>0)return ct*(pp/ptp);
  return rec.pieces>0?ct/rec.pieces:0;
}
function algRec(rec,ings){
  const s=new Set();
  rec.lignes.forEach(l=>{const ing=ings.find(i=>i.id===l.id);(ing?.allergenes||[]).forEach(a=>s.add(a));});
  return [...s];
}
function catOf(rec){return CATEGORIES.find(c=>c.key===rec.cat)||CATEGORIES[0];}

// Storage
const SK='fichespro-v9';
function load(){try{const r=localStorage.getItem(SK);return r?JSON.parse(r):null;}catch{return null;}}
function save(d){try{localStorage.setItem(SK,JSON.stringify(d));}catch{}}

// ═══════════════════════════════════════════════════════
// STATE GLOBAL
// ═══════════════════════════════════════════════════════
const saved=load();
let STATE={
  tab:'dashboard',
  ings:saved?.ings||JSON.parse(JSON.stringify(DEF_INGS)),
  fourns:saved?.fourns||JSON.parse(JSON.stringify(DEF_FOURNS)),
  recs:saved?.recs||[],
  activeRecId:null,
  demoMode:false,
  modal:null // 'pdf-picker'
};

function setState(patch){
  Object.assign(STATE,patch);
  save({ings:STATE.ings,fourns:STATE.fourns,recs:STATE.recs});
  render();
}

// ═══════════════════════════════════════════════════════
// RENDER ENGINE (vanilla DOM)
// ═══════════════════════════════════════════════════════
function el(tag,attrs={},children=[]){
  const e=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='html')e.innerHTML=v;
    else if(k==='class')e.className=v;
    else e.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false)return;
    e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return e;
}
function div(attrs,children){return el('div',attrs,children);}
function span(attrs,children){return el('span',attrs,children);}
function btn(attrs,children){return el('button',attrs,children);}
function inp(attrs){return el('input',attrs);}
function sel(attrs,options){
  const s=el('select',attrs);
  options.forEach(o=>{
    const opt=el('option',{value:o.v},o.v!==undefined?[o.l]:o);
    s.appendChild(opt);
    if(o.sel)opt.selected=true;
  });
  return s;
}
function h(n,attrs,children){return el('h'+n,attrs,children);}
function p(attrs,children){return el('p',attrs,children);}

function render(){
  const app=document.getElementById('app');
  app.innerHTML='';
  app.appendChild(buildApp());
}

// ═══════════════════════════════════════════════════════
// BUILD APP
// ═══════════════════════════════════════════════════════
function buildApp(){
  const root=div({});

  // Header
  root.appendChild(buildHeader());

  // Demo banner
  if(STATE.demoMode){
    root.appendChild(div({class:'demo-banner'},[
      span({},'🧪 Mode démo — données fictives'),
      btn({style:{background:'rgba(255,255,255,.2)',color:'#fff',borderRadius:'8px',padding:'4px 12px',fontSize:'12px'},onClick:()=>setState({demoMode:false,recs:[],activeRecId:null})},'✕ Effacer démo')
    ]));
  }

  // Modal
  if(STATE.modal==='pdf-picker') root.appendChild(buildPDFPicker());

  // Main
  const main=div({style:{maxWidth:'960px',margin:'0 auto',padding:'16px'}});
  if(STATE.tab==='dashboard') main.appendChild(buildDashboard());
  else if(STATE.tab==='ingredients') main.appendChild(buildIngredients());
  else if(STATE.tab==='recettes') main.appendChild(buildRecettes());
  else if(STATE.tab==='prix') main.appendChild(buildPrix());
  root.appendChild(main);

  return root;
}

// ── HEADER ──────────────────────────────────────────────────────
function buildHeader(){
  const tabs=[
    {id:'dashboard',label:'Dashboard',icon:'📊'},
    {id:'ingredients',label:'Ingrédients',icon:'🛒'},
    {id:'recettes',label:'Recettes',icon:'👨‍🍳'},
    {id:'prix',label:'Prix',icon:'💰'},
  ];
  return div({style:{background:'#2c2416',color:'#f5f0e8',padding:'10px 16px',position:'sticky',top:'0',zIndex:'50',boxShadow:'0 2px 8px rgba(0,0,0,.3)'}},[
    div({style:{maxWidth:'960px',margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between',gap:'8px'}},[
      div({style:{display:'flex',alignItems:'center',gap:'8px'}},[
        div({style:{width:'34px',height:'34px',borderRadius:'50%',background:'#c8a96e',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px',flexShrink:'0'}},'🥖'),
        div({},[
          div({style:{fontSize:'15px',fontWeight:'700',lineHeight:'1.1'}},'FichesPro'),
          div({style:{fontSize:'10px',opacity:'.6'}},'Boulangerie')
        ])
      ]),
      div({style:{display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap',justifyContent:'flex-end'}},[
        // Export btn
        btn({style:{background:'rgba(255,255,255,.15)',color:'#f5f0e8',borderRadius:'8px',padding:'6px 10px',fontSize:'12px',display:'flex',alignItems:'center',gap:'4px'},
          onClick:()=>{
            const d=JSON.stringify({ings:STATE.ings,fourns:STATE.fourns,recs:STATE.recs},null,2);
            const b=new Blob([d],{type:'application/json'});
            const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='fichespro.json';a.click();
          }},'⬇ Export JSON'),
        // Import
        el('label',{style:{background:'rgba(255,255,255,.15)',color:'#f5f0e8',borderRadius:'8px',padding:'6px 10px',fontSize:'12px',cursor:'pointer'}},[
          '⬆ Import',
          el('input',{type:'file',accept:'.json',style:{display:'none'},onChange(e){
            const f=e.target.files[0];if(!f)return;
            const r=new FileReader();
            r.onload=ev=>{try{const d=JSON.parse(ev.target.result);setState({ings:d.ings||STATE.ings,fourns:d.fourns||STATE.fourns,recs:d.recs||STATE.recs});}catch{alert('Fichier invalide');}};
            r.readAsText(f);
          }})
        ]),
        // Demo
        !STATE.demoMode&&btn({style:{background:'rgba(230,126,34,.3)',color:'#f0a060',borderRadius:'8px',padding:'6px 10px',fontSize:'12px',border:'1px solid rgba(230,126,34,.5)'},
          onClick:()=>setState({demoMode:true,ings:JSON.parse(JSON.stringify(DEF_INGS)),fourns:JSON.parse(JSON.stringify(DEF_FOURNS)),recs:JSON.parse(JSON.stringify(DEMO_RECS)),tab:'recettes'})},'🧪 Démo'),
        // Nav tabs
        ...tabs.map(t=>btn({
          style:{background:STATE.tab===t.id?'#c8a96e':'transparent',color:STATE.tab===t.id?'#2c2416':'#f5f0e8',borderRadius:'8px',padding:'6px 10px',fontSize:'12px',fontWeight:STATE.tab===t.id?'700':'400',display:'flex',flexDirection:'column',alignItems:'center',gap:'2px'},
          onClick:()=>setState({tab:t.id})},[t.icon,div({style:{fontSize:'9px'}},[t.label])])
        )
      ])
    ])
  ]);
}

// ── DASHBOARD ───────────────────────────────────────────────────
function buildDashboard(){
  const {ings,fourns,recs}=STATE;
  const topRecs=[...recs].sort((a,b)=>(b.freq||0)-(a.freq||0)).slice(0,5);
  const mCout=recs.length?recs.reduce((s,r)=>s+cppRec(r,ings),0)/recs.length:0;
  const alertes=[];
  ings.forEach(ing=>Object.entries(ing.prix||{}).forEach(([fid,hist])=>{
    if(!hist||!hist.length)return;
    const dp=hist[hist.length-1];const j=daysSince(dp.d);
    if(j>30)alertes.push({ing,f:fourns.find(f=>f.id===parseInt(fid)),j,d:dp.d});
  }));
  const algMap={};
  recs.forEach(r=>algRec(r,ings).forEach(a=>{algMap[a]=(algMap[a]||0)+1;}));

  return div({},[
    sectionTitle('📊','Tableau de bord','Vue synthétique de votre activité'),
    div({style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'16px'}},[
      statCard('Recettes',recs.length,'👨‍🍳'),
      statCard('Ingrédients',ings.length,'🛒'),
      statCard('Fournisseurs',fourns.length,'🚛'),
      statCard('Coût moy./pièce',fe(mCout),'💰',true),
    ]),
    // Top recettes
    div({class:'card'},[
      div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}},[
        div({class:'label'},'🔥 Recettes les + utilisées'),
        btn({style:{color:'#c8a96e',fontSize:'12px',textDecoration:'underline'},onClick:()=>setState({tab:'recettes'})},'Voir tout')
      ]),
      topRecs.length===0?p({style:{color:'#9c8469',fontSize:'13px',textAlign:'center',padding:'12px'}},'Aucune recette encore'):
      div({},[...topRecs.map((r,i)=>{
        const cat=catOf(r);
        return div({style:{display:'flex',alignItems:'center',gap:'10px',padding:'8px 0',borderBottom:i<topRecs.length-1?'1px solid #e8dcc8':'none',cursor:'pointer'},onClick:()=>{STATE.activeRecId=r.id;r.freq=(r.freq||0)+1;setState({tab:'recettes'});}},[
          div({style:{width:'32px',height:'32px',borderRadius:'8px',background:'#f5f0e8',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px',flexShrink:'0'}},[r.photo?el('img',{src:r.photo,style:{width:'32px',height:'32px',borderRadius:'8px',objectFit:'cover'}}):cat.e]),
          span({style:{width:'20px',height:'20px',borderRadius:'50%',background:'#c8a96e22',color:'#c8a96e',display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:'700',flexShrink:'0'}},[(i+1)]),
          div({style:{flex:'1',minWidth:'0'}},[
            div({style:{fontWeight:'600',fontSize:'13px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},[r.nom]),
            div({style:{fontSize:'11px',color:'#9c8469'}},[fe(cppRec(r,ings))+'/pièce'])
          ]),
          span({class:'tag',style:{background:'#fdf3e0',color:'#c8a96e'}},['🔥',r.freq||0])
        ]);
      })])
    ]),
    // Alertes prix
    div({class:'card',style:{marginTop:'12px'}},[
      div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}},[
        div({class:'label',style:{color:alertes.length>0?'#e67e22':'#9c8469'}},'⚠️ Prix non mis à jour (+30j)'),
        alertes.length>0&&span({class:'tag',style:{background:'#fde8c0',color:'#e67e22'}},[alertes.length])
      ]),
      alertes.length===0?div({style:{background:'#e8f5e2',borderRadius:'10px',padding:'10px 14px',color:'#3a7d44',fontSize:'13px',display:'flex',alignItems:'center',gap:'8px'}},['✅ Tous les prix sont récents']):
      div({},[...alertes.slice(0,5).map((a,i)=>div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:i<Math.min(alertes.length,5)-1?'1px solid #e8dcc8':'none'}},[
        div({},[div({style:{fontWeight:'600',fontSize:'13px'}},[a.ing.nom]),div({style:{fontSize:'11px',color:'#9c8469'}},[a.f?.nom+' · '+a.d])]),
        span({class:'tag',style:{background:'#fde8c0',color:'#e67e22'}},[a.j+'j'])
      ]))])
    ]),
    // Allergènes
    Object.keys(algMap).length>0&&div({class:'card',style:{marginTop:'12px'}},[
      div({class:'label',style:{marginBottom:'10px'}},'🛡️ Allergènes dans vos recettes'),
      div({style:{display:'flex',flexWrap:'wrap',gap:'6px'}},[
        ...Object.entries(algMap).sort((a,b)=>b[1]-a[1]).map(([key,count])=>{
          const a=ALLERGENES.find(x=>x.key===key);
          return a?span({class:'tag',style:{background:'#fde8c0',border:'1px solid #c8a96e',color:'#6b5a3e'}},[a.e+' '+a.label+' ×'+count]):null;
        }).filter(Boolean)
      ])
    ])
  ]);
}

// ── INGRÉDIENTS ──────────────────────────────────────────────────
function buildIngredients(){
  const {ings,fourns,recs}=STATE;
  const freqMap={};
  recs.forEach(r=>r.lignes.forEach(l=>{freqMap[l.id]=(freqMap[l.id]||0)+1;}));

  const search=(document.getElementById('ing-search')?.value||'').toLowerCase();
  const sortMode=document.getElementById('ing-sort')?.value||'alpha';
  let sorted=[...ings].filter(i=>i.nom.toLowerCase().includes(search));
  if(sortMode==='alpha')sorted.sort((a,b)=>a.nom.localeCompare(b.nom,'fr'));

function createRecette(){
  const nom=document.getElementById('rec-nom')?.value.trim();if(!nom)return;
  const cat=document.getElementById('rec-cat')?.value||'pains';
  const r={id:Date.now(),nom,cat,lignes:[],pieces:1,poids:'',modeCalc:'pieces',freq:0,notes:'',photo:null};

  const i=document.getElementById('rec-nom');if(i)i.value='';
  render();
}

function buildPrix(){

  const ps=STATE.prixState;

  const rec=ps.selId?recs.find(r=>r.id===parseInt(ps.selId)):null;
  const cout=rec?cppRec(rec,ings):(ps.modeM==='pieces'?parseFloat(ps.coutM)||0:(parseFloat(ps.coutM)||0)*(parseFloat(ps.poidsM)||0));

  let coef=0,prixHT=0,prixTTC=0,marge=0,margePct=0;
  if(cout>0){
    const tm=1+ps.tva/100;
    if(ps.mode==='coef'){const c=parseFloat(ps.coef)||1;const ht=cout*c;const ttc=ht*tm;coef=c;prixHT=ht;prixTTC=ttc;marge=ttc-cout;margePct=((ttc-cout)/ttc)*100;}
    else if(ps.mode==='prixTTC'){const ttc=parseFloat(ps.prixS)||0;const ht=ttc/tm;coef=cout>0?ht/cout:0;prixHT=ht;prixTTC=ttc;marge=ttc-cout;margePct=ttc>0?((ttc-cout)/ttc)*100:0;}
    else{const tm2=(parseFloat(ps.margeS)||0)/100;if(tm2<1){const ttc=tm2>0?cout/(1-tm2):cout;const ht=ttc/tm;coef=cout>0?ht/cout:0;prixHT=ht;prixTTC=ttc;marge=ttc-cout;margePct=tm2*100;}}

  const algs=rec?algRec(rec,ings):[];
  const compF=rec?fourns.map(f=>{const fm={};rec.lignes.forEach(l=>{fm[l.id]=f.id;});const ct=coutRec(rec,ings,fm);return{f,cp:cppRec({...rec},ings,fm),ct};}).filter(x=>x.ct>0).sort((a,b)=>a.cp-b.cp):[];

          el('option',{value:''},'— Saisie manuelle —'),

        ])
      ]),
      rec?div({style:{background:'#fdf3e0',borderRadius:'10px',padding:'10px',display:'flex',flexWrap:'wrap',gap:'6px'}},[

        div({style:{display:'flex',borderRadius:'8px',overflow:'hidden',border:'1px solid #d4c5a9',marginBottom:'10px'}},[
          btn({style:{flex:'1',padding:'7px',background:ps.modeM==='pieces'?'#2c2416':'#fdf8f0',color:ps.modeM==='pieces'?'#c8a96e':'#9c8469',fontSize:'12px'},onClick:()=>upd({modeM:'pieces'})},'Coût/pièce'),
          btn({style:{flex:'1',padding:'7px',background:ps.modeM==='poids'?'#2c2416':'#fdf8f0',color:ps.modeM==='poids'?'#c8a96e':'#9c8469',fontSize:'12px',borderLeft:'1px solid #d4c5a9'},onClick:()=>upd({modeM:'poids'})},'Coût au gramme')
        ]),
        ps.modeM==='pieces'&&div({},[p({style:{fontSize:'13px',color:'#6b5a3e',marginBottom:'4px'}},'Coût/pièce (€)'),inp({type:'number',step:'0.001',placeholder:'ex: 0.245',value:ps.coutM,onInput:e=>upd({coutM:e.target.value})})]),
        ps.modeM==='poids'&&div({style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}},[
          div({},[p({style:{fontSize:'13px',color:'#6b5a3e',marginBottom:'4px'}},'Coût au gramme (€/g)'),inp({type:'number',step:'0.00001',placeholder:'ex: 0.00245',value:ps.coutM,onInput:e=>upd({coutM:e.target.value})})]),
          div({},[p({style:{fontSize:'13px',color:'#6b5a3e',marginBottom:'4px'}},'Poids/pièce (g)'),inp({type:'number',step:'1',placeholder:'ex: 250',value:ps.poidsM,onInput:e=>upd({poidsM:e.target.value})})])
        ])

    ]),

    // Allergènes
    algs.length>0&&div({style:{background:'#fde8c0',border:'1px solid #c8a96e',borderRadius:'10px',padding:'10px 14px',display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center',marginTop:'10px'}},[

      ])
    ]),

    // Mode calcul
    div({class:'card',style:{marginTop:'10px'}},[
      div({class:'label',style:{marginBottom:'10px'}},'Je calcule à partir de…'),
      div({style:{display:'flex',borderRadius:'12px',overflow:'hidden',border:'1px solid #d4c5a9',marginBottom:'14px'}},[
        ...[[{key:'coef',label:'Coefficient',icon:'#'},{key:'prixTTC',label:'Prix de vente',icon:'€'},{key:'marge',label:'Taux de marge',icon:'%'}]].flat().map((m,idx,arr)=>btn({

          el('input',{type:'range',min:'1',max:'10',step:'0.1',value:ps.coef,style:{flex:'1',accentColor:'#c8a96e'},onInput:e=>upd({coef:e.target.value})}),
          inp({type:'number',min:'1',max:'20',step:'0.1',value:ps.coef,style:{width:'70px',textAlign:'center',fontWeight:'700'},onInput:e=>upd({coef:e.target.value})})
        ])

      ps.mode==='prixTTC'&&div({},[
        p({style:{fontSize:'13px',color:'#6b5a3e',marginBottom:'8px'}},'Prix de vente TTC souhaité (€)'),
        div({style:{position:'relative'}},[
          inp({type:'number',min:'0',step:'0.01',placeholder:'ex: 1.20',value:ps.prixS,style:{textAlign:'center',fontSize:'24px',fontWeight:'700',border:'2px solid #c8a96e',paddingRight:'30px'},onInput:e=>upd({prixS:e.target.value})}),
          span({style:{position:'absolute',right:'12px',top:'50%',transform:'translateY(-50%)',color:'#c8a96e',fontWeight:'700',fontSize:'18px'}},'€')
        ]),

}

// ── PRINT ────────────────────────────────────────────────────────
function printFiche(rec,ings){
  const ct=coutRec(rec,ings,{});const cpp=cppRec(rec,ings);
  const pp=parseFloat(rec.poids)||0;const ptp=rec.lignes.reduce((s,l)=>s+(parseFloat(l.q)||0),0);
  const npt=rec.modeCalc==='poids'&&pp>0&&ptp>0?Math.floor(ptp/pp):null;
  const algs=algRec(rec,ings);const cat=catOf(rec);
  const rows=rec.lignes.map(l=>{
    const ing=ings.find(i=>i.id===l.id);if(!ing)return'';
    const p=bestPrice(ing);const div2=ing.unite==='piece'?1:1000;const c=(l.q/div2)*p;
    const u=ing.unite==='kg'?'g':ing.unite==='L'?'mL':'pcs';
    return`<tr><td>${ing.nom}</td><td style="text-align:right">${l.q} ${u}</td><td style="text-align:right;font-family:monospace">${fe(p)}/${ing.unite}</td><td style="text-align:right;font-family:monospace;font-weight:bold;color:#c8a96e">${fe(c)}</td></tr>`;
  }).join('');
  const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${rec.nom}</title><style>body{font-family:Georgia,serif;color:#2c2416;padding:24px;max-width:700px;margin:0 auto;font-size:13px}h2{border-left:4px solid #c8a96e;padding-left:10px}table{width:100%;border-collapse:collapse;margin:12px 0}th{background:#2c2416;color:#c8a96e;padding:7px 10px;text-align:left;font-size:11px;text-transform:uppercase}td{padding:6px 10px;border-bottom:1px solid #e8dcc8}.info{background:#fdf3e0;padding:10px;border-radius:6px;margin:10px 0;font-size:12px;display:flex;gap:16px;flex-wrap:wrap}.alg{background:#fde8c0;padding:8px;border-radius:6px;margin:8px 0;font-size:12px}.notes{background:#f5f0e8;padding:10px;border-radius:6px;margin:10px 0;font-size:12px}@media print{body{padding:12px}}</style></head><body>
    ${rec.photo?`<img src="${rec.photo}" style="width:100%;max-height:200px;object-fit:cover;border-radius:8px;margin-bottom:12px"/>`:``}
    <h2>${cat.e} ${rec.nom}</h2>
    <div class="info">
      <span>Portionnement : <strong>${rec.modeCalc==='poids'?`${pp}g/pièce · ${npt||'?'} pcs`:`${rec.pieces} pièces`}</strong></span>
      <span>Coût total : <strong>${fe(ct)}</strong></span>
      <span>Coût/pièce : <strong style="color:#c8a96e;font-size:16px">${fe(cpp)}</strong></span>
    </div>
    ${algs.length?`<div class="alg">⚠️ Allergènes : ${algs.map(k=>{const a=ALLERGENES.find(x=>x.key===k);return a?a.e+' '+a.label:'';}).join(' · ')}</div>`:''}
    <table><thead><tr><th>Ingrédient</th><th style="text-align:right">Quantité</th><th style="text-align:right">Prix unit.</th><th style="text-align:right">Coût</th></tr></thead><tbody>${rows}</tbody></table>
    ${rec.notes?`<div class="notes">📝 Notes :<br/>${rec.notes.replace(/\n/g,'<br/>')}</div>`:''}
    <p style="font-size:10px;opacity:.4;margin-top:20px;text-align:center">FichesPro · ${new Date().toLocaleDateString('fr-FR')}</p>
    </body></html>`;
  const w=window.open('','_blank');w.document.write(html);w.document.close();w.print();
}

    div({},[h(2,{style:{fontSize:'19px',fontWeight:'700',fontFamily:'Georgia',color:'#2c2416'}},[title]),p({style:{fontSize:'11px',color:'#9c8469',marginTop:'-1px'}},[sub])])
  ]);

function buildPDFPicker(){
  const {recs,ings}=STATE;
  if(!STATE.pdfSelected)STATE.pdfSelected=recs.map(r=>r.id);
  const sel=STATE.pdfSelected;
  const search=(STATE.pdfSearch||'').toLowerCase();
  const filtered=recs.filter(r=>r.nom.toLowerCase().includes(search));
  const allOn=filtered.every(r=>sel.includes(r.id));
  return div({class:'modal-bg',onClick:()=>{STATE.modal=null;render();}},[
    div({class:'modal',onClick:e=>e.stopPropagation()},[
      div({style:{background:'#2c2416',padding:'16px 20px',display:'flex',justifyContent:'space-between',alignItems:'center'}},[
        span({style:{color:'#f5f0e8',fontWeight:'700',fontSize:'15px'}},'🖨️ Choisir les fiches à imprimer'),
        btn({style:{color:'rgba(255,255,255,.6)',fontSize:'18px'},onClick:()=>{STATE.modal=null;render();}},'✕')
      ]),
      div({style:{padding:'12px 16px',borderBottom:'1px solid #e8dcc8'}},[
        inp({placeholder:'🔍 Rechercher…',value:STATE.pdfSearch||'',onInput:e=>{STATE.pdfSearch=e.target.value;render();}})
      ]),
      div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 16px',background:'#faf6ef',borderBottom:'1px solid #e8dcc8'}},[
        span({style:{fontSize:'12px',color:'#9c8469'}},[(sel.length)+'/'+recs.length+' sélectionnée'+(sel.length>1?'s':'')]),
        btn({style:{fontSize:'12px',fontWeight:'600',background:allOn?'#2c2416':'#fdf3e0',color:'#c8a96e',borderRadius:'8px',padding:'4px 12px'},
          onClick:()=>{STATE.pdfSelected=allOn?[]:filtered.map(r=>r.id);render();}},[allOn?'Tout désélectionner':'Tout sélectionner'])
      ]),
      div({style:{maxHeight:'300px',overflowY:'auto'}},[
        ...filtered.map(r=>{
          const isOn=sel.includes(r.id);const cat=catOf(r);const algs=algRec(r,ings);
          return div({style:{display:'flex',alignItems:'center',gap:'10px',padding:'10px 16px',borderBottom:'1px solid #f0ebe1',background:isOn?'#fdf8f0':'#fff',cursor:'pointer'},
            onClick:()=>{STATE.pdfSelected=isOn?sel.filter(x=>x!==r.id):[...sel,r.id];render();}},[
            div({style:{width:'20px',height:'20px',borderRadius:'6px',flexShrink:'0',background:isOn?'#c8a96e':'#fff',border:`2px solid ${isOn?'#c8a96e':'#d4c5a9'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px'}},isOn?'✓':''),
            r.photo?el('img',{src:r.photo,style:{width:'36px',height:'36px',borderRadius:'8px',objectFit:'cover',flexShrink:'0'}}):div({style:{width:'36px',height:'36px',borderRadius:'8px',background:'#f5f0e8',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px',flexShrink:'0'}},[cat.e]),
            div({style:{flex:'1',minWidth:'0'}},[
              div({style:{fontWeight:'600',fontSize:'13px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},[r.nom]),
              div({style:{fontSize:'11px',color:'#9c8469',display:'flex',gap:'6px',alignItems:'center'}},[fe(cppRec(r,ings))+'/pièce',algs.length>0&&algs.map(k=>ALLERGENES.find(x=>x.key===k)?.e||'').join(''),r.notes&&'💬'].filter(Boolean))
            ])
          ]);
        })
      ]),
      div({style:{display:'flex',justifyContent:'space-between',padding:'12px 16px',borderTop:'1px solid #e8dcc8',background:'#faf6ef'}},[
        btn({style:{background:'#f5f0e8',color:'#6b5a3e',borderRadius:'10px',padding:'8px 16px',fontWeight:'600'},onClick:()=>{STATE.modal=null;render();}},'Annuler'),
        btn({class:'btn-dark',style:{display:'flex',alignItems:'center',gap:'6px',opacity:sel.length?'1':'.5'},
          onClick:()=>{
            if(!sel.length)return;
            const toExp=recs.filter(r=>sel.includes(r.id));
            const fiches=toExp.map(r=>buildFicheHTMLStr(r,ings)).join('<div style="page-break-after:always"></div>');
            const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>FichesPro</title><style>body{font-family:Georgia,serif;color:#2c2416;padding:24px;max-width:700px;margin:0 auto;font-size:13px}h2{border-left:4px solid #c8a96e;padding-left:10px}table{width:100%;border-collapse:collapse;margin:12px 0}th{background:#2c2416;color:#c8a96e;padding:7px 10px;text-align:left;font-size:11px;text-transform:uppercase}td{padding:6px 10px;border-bottom:1px solid #e8dcc8}.info{background:#fdf3e0;padding:10px;border-radius:6px;margin:10px 0;font-size:12px;display:flex;gap:16px;flex-wrap:wrap}.alg{background:#fde8c0;padding:8px;border-radius:6px;margin:8px 0;font-size:12px}.notes{background:#f5f0e8;padding:10px;border-radius:6px;margin:10px 0;font-size:12px}@media print{body{padding:12px}}</style></head><body>${fiches}</body></html>`;
            const w=window.open('','_blank');w.document.write(html);w.document.close();w.print();
            STATE.modal=null;render();
          }},['🖨️ Imprimer ('+(sel.length)+')'])
      ])
    ])
  ]);
}
function buildFicheHTMLStr(rec,ings){
  const ct=coutRec(rec,ings,{});const cpp=cppRec(rec,ings);
  const pp=parseFloat(rec.poids)||0;const ptp=rec.lignes.reduce((s,l)=>s+(parseFloat(l.q)||0),0);
  const npt=rec.modeCalc==='poids'&&pp>0&&ptp>0?Math.floor(ptp/pp):null;
  const algs=algRec(rec,ings);const cat=catOf(rec);
  const rows=rec.lignes.map(l=>{
    const ing=ings.find(i=>i.id===l.id);if(!ing)return'';
    const p=bestPrice(ing);const d=ing.unite==='piece'?1:1000;const c=(l.q/d)*p;
    const u=ing.unite==='kg'?'g':ing.unite==='L'?'mL':'pcs';
    return`<tr><td>${ing.nom}</td><td style="text-align:right">${l.q} ${u}</td><td style="text-align:right;font-family:monospace">${fe(p)}/${ing.unite}</td><td style="text-align:right;font-family:monospace;font-weight:bold;color:#c8a96e">${fe(c)}</td></tr>`;
  }).join('');
  return`<div>${rec.photo?`<img src="${rec.photo}" style="width:100%;max-height:200px;object-fit:cover;border-radius:8px;margin-bottom:12px"/>`:``}<h2>${cat.e} ${rec.nom}</h2><div class="info"><span>Portionnement : <strong>${rec.modeCalc==='poids'?`${pp}g/pièce · ${npt||'?'} pcs`:`${rec.pieces} pièces`}</strong></span><span>Coût total : <strong>${fe(ct)}</strong></span><span>Coût/pièce : <strong style="color:#c8a96e;font-size:16px">${fe(cpp)}</strong></span></div>${algs.length?`<div class="alg">⚠️ ${algs.map(k=>{const a=ALLERGENES.find(x=>x.key===k);return a?a.e+' '+a.label:'';}).join(' · ')}</div>`:''}<table><thead><tr><th>Ingrédient</th><th style="text-align:right">Quantité</th><th style="text-align:right">Prix unit.</th><th style="text-align:right">Coût</th></tr></thead><tbody>${rows}</tbody></table>${rec.notes?`<div class="notes">📝 ${rec.notes.replace(/\n/g,'<br/>')}</div>`:''}</div>`;
}
